<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>미래엔 공통수학1 · 오답 노트 (학생용)</title>
<style>
:root{--navy:#1F3864;--ink:#1f2328;--mut:#6b7280;--line:#e5e7eb;--bg:#f7f8fa;--card:#fff;--accent:#185fa5;--accbg:#e6f1fb;--warn:#C2772E;--head:#5f6b7a;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding:14px}
.phone{max-width:420px;margin:0 auto;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--card)}
.hbar{background:var(--head);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:11px 16px;font-size:15px;font-weight:600}
.scr{padding:16px}
.book{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:17px;font-weight:700;color:var(--accent)}
.ch{background:var(--bg);border-radius:8px;padding:13px 15px;margin-bottom:8px;font-size:15px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between}
.mid{margin:0 0 8px 14px;background:var(--accbg);color:var(--accent);border-radius:8px;padding:11px 15px;font-size:14px;cursor:pointer}
.back{border:none;background:none;font-size:20px;cursor:pointer;color:var(--mut)}
.cornerbar{background:var(--accent);color:#fff;font-size:13px;font-weight:600;padding:7px 11px;border-radius:6px;margin:12px 0 8px}
.nums{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.num{height:38px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:14px;font-weight:500;cursor:pointer;color:var(--ink)}
.num.on{border-color:var(--warn);background:#FAEEDA;color:var(--warn)}
.main{width:100%;height:42px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:18px}
.nav{display:flex;gap:8px;margin-top:12px}
.nav button{flex:1;height:36px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:14px;cursor:pointer}
.send{display:flex;gap:8px;margin-top:8px}
.send .pdf{flex:1;height:40px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.send .home{height:40px;padding:0 18px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:14px;cursor:pointer}
.badge{display:inline-block;color:#fff;font-size:12px;font-weight:600;padding:3px 13px;border-radius:6px}
.ph{border:1px dashed #b9bcc2;border-radius:6px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:10px;color:var(--mut);padding:6px;overflow:hidden}
.ph img{max-width:100%;max-height:100%;display:block}
/* 손글씨 괘선 */
.rule{background-image:repeating-linear-gradient(transparent,transparent 39px,#cbd0d8 39px,#cbd0d8 40px);border-radius:4px}
.qcard{border:1px solid var(--line);border-radius:8px;overflow:hidden}
@media print{
  body{background:#fff;padding:0}
  .phone{border:none;max-width:none;border-radius:0}
  .hbar,.nav,.send,.pnav{display:none!important}
  .scr{padding:0}
  .qcard{border:1px solid #333;display:flex;flex-direction:column;break-inside:avoid}
  .qimg{height:74mm!important}
  .kmemo{height:28mm!important;min-height:0!important;flex:none!important}
  .solve{height:80mm!important;flex:none!important}
  .ph{border-color:#999}
}
</style></head>

  h+='<div class="solvewrap" style="padding:8px"><span class="badge" style="background:var(--accent)">풀이</span><div class="rule solve" style="margin-top:7px;height:360px"></div></div>';

  h+='<div class="send"><button class="pdf" onclick="window.print()">전송 (PDF 저장)</button><button class="home" onclick="__home()">Home</button></div>';
  scr.innerHTML=h;
}
