<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>미래엔 공통수학1 · 오답 노트 (교사용)</title>
<style>
:root{--navy:#1F3864;--ink:#1f2328;--mut:#6b7280;--line:#e5e7eb;--bg:#f7f8fa;--card:#fff;--accent:#185fa5;--accbg:#e6f1fb;--warn:#C2772E;--head:#5f6b7a;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding:14px}
.phone{max-width:420px;margin:0 auto;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--card)}
.hbar{background:var(--head);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:11px 16px;font-size:15px;font-weight:600}
.scr{padding:16px}
.book{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:17px;font-weight:700;color:var(--accent)}
.ch{background:var(--bg);border-radius:8px;padding:13px 15px;margin-bottom:8px;font-size:15px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between}
.mid{margin:0 0 8px 14px;background:var(--accbg);color:var(--accent);border-radius:8px;padding:11px 15px;font-size:14px;cursor:pointer}
.back{border:none;background:none;font-size:20px;cursor:pointer;color:var(--mut)}
.cornerbar{background:var(--accent);color:#fff;font-size:13px;font-weight:600;padding:7px 11px;border-radius:6px;margin:12px 0 8px}
.nums{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.num{height:38px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:14px;font-weight:500;cursor:pointer;color:var(--ink)}
.num.on{border-color:var(--warn);background:#FAEEDA;color:var(--warn)}
.main{width:100%;height:42px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:18px}
.nav{display:flex;gap:8px;margin-top:12px}
.nav button{flex:1;height:36px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:14px;cursor:pointer}
.send{display:flex;gap:8px;margin-top:8px}
.send .pdf{flex:1;height:40px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.send .home{height:40px;padding:0 18px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:14px;cursor:pointer}
.ph{border:1px dashed #b9bcc2;border-radius:6px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:9px;color:var(--mut);padding:4px;overflow:hidden}
.ph img{max-width:100%;max-height:100%;display:block}
@media print{@page{margin:10mm}body{background:#fff;padding:0}.phone{border:none;max-width:none}.hbar,.nav,.send{display:none!important}.tcell{min-height:108mm!important}.timg{height:95mm!important}}
</style></head>

var openCh=null,curDae=null,curMid=null,sel=[],page=0,PER=4;
function K(d,m,c,n){return [d,m,c,n].join("||");}
function pad(n){return n<10?'0'+n:''+n;}
function lookupImg(d,m,c,n){var arr=DATA.units[d][m][c]||[];for(var i=0;i<arr.length;i++)if(String(arr[i].no)===String(n))return arr[i].img;return "";}
function esc(s){return String(s).replace(/'/g,"\\'");}

function renderUnits(){
  var h='<div class="book"><span style="font-size:18px">📒</span>'+DATA.book+'</div>';
  Object.keys(DATA.units).forEach(function(d){
    h+='<div class="ch" onclick="__tg(\''+esc(d)+'\')"><span>'+d+'</span><span style="color:var(--mut)">'+(openCh===d?'▴':'▾')+'</span></div>';
    if(openCh===d)Object.keys(DATA.units[d]).forEach(function(m){h+='<div class="mid" onclick="__mid(\''+esc(d)+'\',\''+esc(m)+'\')">'+m+'</div>';});
  });
  scr.innerHTML=h;
}
function renderSelect(){
  var h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><button class="back" onclick="__home()">‹</button><span style="font-size:15px;font-weight:600">'+curMid+'</span></div><p style="font-size:12px;color:var(--mut);margin:0 0 12px">오답 노트로 구성할 문제 번호를 누르세요. 쪽당 4문제로 묶입니다.</p>';
  var corners=DATA.units[curDae][curMid];
  Object.keys(corners).forEach(function(c){
    h+='<div class="cornerbar">'+c+'</div><div class="nums">';
    corners[c].forEach(function(p){var on=sel.indexOf(K(curDae,curMid,c,p.no))>=0;
      h+='<button class="num'+(on?' on':'')+'" onclick="__sel(\''+esc(c)+'\','+p.no+')">'+p.no+'</button>';});
    h+='</div>';
  });
  h+='<button class="main" onclick="__gen()">오답 노트 생성 ('+sel.length+'문제)</button>';
  scr.innerHTML=h;
}
function cell(i,right,bottom){
  var bd='';if(right)bd+='border-right:1px solid var(--line);';if(bottom)bd+='border-bottom:1px solid var(--line);';
  if(i>=sel.length)return '<div class="tcell" style="'+bd+'min-height:130px"></div>';
  var parts=sel[i].split("||"),d=parts[0],m=parts[1],c=parts[2],n=parts[3],img=lookupImg(d,m,c,n);
  var inner=img?'<img src="images/'+img+'" alt="'+n+'번">':'교재 문항<br>이미지 자리';
  return '<div class="tcell" style="'+bd+'padding:9px;min-height:130px"><div style="font-size:14px;font-weight:700;color:var(--accent);margin-bottom:6px">'+pad(i+1)+'</div><div class="ph timg" style="height:92px">'+inner+'</div></div>';
}
function renderNote(){
  if(!sel.length){renderSelect();return;}
  var pages=Math.ceil(sel.length/PER),b=page*PER;
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><button class="back" onclick="__back()">‹</button><span style="font-size:12px;color:var(--mut)">'+(page+1)+' / '+pages+' 쪽</span></div>';
  h+='<div style="border:1px solid var(--line);border-radius:8px;overflow:hidden"><div style="display:flex;align-items:center;gap:10px;background:var(--accbg);padding:8px 10px"><span style="font-size:12px;font-weight:700;color:#C0392B;line-height:1.1">오답<br>노트</span><span style="flex:1;background:#fff;border:1px solid var(--line);border-radius:6px;text-align:center;font-size:13px;font-weight:600;padding:6px">'+curMid+'</span></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr">'+cell(b,true,true)+cell(b+1,false,true)+cell(b+2,true,false)+cell(b+3,false,false)+'</div>';
  h+='<div style="text-align:center;font-size:11px;color:var(--mut);padding:5px">'+(page+1)+'</div></div>';
  h+='<div class="nav"><button onclick="__pg(-1)" style="opacity:'+(page===0?'.4':'1')+'">‹ 이전</button><button onclick="__pg(1)" style="opacity:'+(page>=pages-1?'.4':'1')+'">다음 ›</button></div>';
  h+='<div class="send"><button class="pdf" onclick="window.print()">전송 (PDF 저장)</button><button class="home" onclick="__home()">Home</button></div>';
  scr.innerHTML=h;
}
window.__tg=function(d){openCh=(openCh===d?null:d);renderUnits();};
window.__mid=function(d,m){curDae=d;curMid=m;sel=[];page=0;renderSelect();};
window.__home=function(){openCh=null;curDae=null;curMid=null;sel=[];page=0;renderUnits();};
window.__sel=function(c,n){var k=K(curDae,curMid,c,n),i=sel.indexOf(k);if(i>=0)sel.splice(i,1);else sel.push(k);renderSelect();};
window.__gen=function(){if(!sel.length){alert('문제를 1개 이상 선택하세요.');return;}page=0;renderNote();};
window.__back=function(){renderSelect();};
window.__pg=function(dd){var pages=Math.ceil(sel.length/PER);page=Math.max(0,Math.min(pages-1,page+dd));renderNote();};
renderUnits();
